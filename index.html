<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing Speed Racer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --border: #2a2a4a;
    --text: #e0e0f0;
    --dim: #6a6a8a;
    --correct: #4ade80;
    --wrong: #f87171;
    --cursor: #facc15;
    --accent: #38bdf8;
    --accent2: #a78bfa;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .container {
    max-width: 760px;
    width: 100%;
  }

  header {
    text-align: center;
    margin-bottom: 2rem;
  }

  header h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.6rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
  }

  header p {
    color: var(--dim);
    font-size: 0.85rem;
    margin-top: 0.3rem;
  }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-bottom: 1.5rem;
  }

  .stat {
    text-align: center;
  }

  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
  }

  .stat-label {
    font-size: 0.75rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .progress-track {
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 1.5rem;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.15s ease;
  }

  .sentence-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
    margin-bottom: 1.5rem;
    line-height: 2;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.15rem;
    min-height: 100px;
    position: relative;
    cursor: text;
  }

  .sentence-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.15);
  }

  .char {
    position: relative;
    transition: color 0.05s;
  }

  .char.correct { color: var(--correct); }
  .char.wrong {
    color: var(--wrong);
    text-decoration: underline;
    text-decoration-color: var(--wrong);
    text-underline-offset: 4px;
  }
  .char.current {
    color: var(--cursor);
    border-bottom: 2px solid var(--cursor);
    animation: pulse 1s ease-in-out infinite;
  }
  .char.pending { color: var(--dim); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .hidden-input {
    position: absolute;
    opacity: 0;
    width: 0;
    height: 0;
    pointer-events: none;
  }

  .hint {
    text-align: center;
    color: var(--dim);
    font-size: 0.8rem;
    margin-bottom: 1rem;
  }

  .hint kbd {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.15rem 0.4rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
  }

  /* Results overlay */
  .results-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15, 15, 26, 0.9);
    backdrop-filter: blur(8px);
    z-index: 10;
    justify-content: center;
    align-items: center;
  }

  .results-overlay.active {
    display: flex;
  }

  .results-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem;
    text-align: center;
    max-width: 400px;
    width: 90%;
  }

  .results-card h2 {
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 1.5rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .results-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .result-item {
    background: var(--bg);
    border-radius: 8px;
    padding: 1rem;
  }

  .result-item .val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--accent);
  }

  .result-item .lbl {
    font-size: 0.7rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 0.25rem;
  }

  .btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    padding: 0.7rem 1.8rem;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
    font-weight: 600;
  }

  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: var(--bg);
  }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    margin-left: 0.5rem;
  }

  .start-prompt {
    text-align: center;
    color: var(--dim);
    font-size: 0.9rem;
    animation: pulse 2s ease-in-out infinite;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>TYPING SPEED RACER</h1>
    <p>Type the sentence below as fast and accurately as you can</p>
  </header>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-value" id="wpm">0</div>
      <div class="stat-label">WPM</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="accuracy">100</div>
      <div class="stat-label">Accuracy %</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="timer">0.0</div>
      <div class="stat-label">Seconds</div>
    </div>
  </div>

  <div class="progress-track">
    <div class="progress-fill" id="progress"></div>
  </div>

  <div class="sentence-box" id="sentenceBox" tabindex="0">
    <input class="hidden-input" id="hiddenInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <div id="sentence"></div>
    <div class="start-prompt" id="startPrompt">Click here or start typing...</div>
  </div>

  <div class="hint">
    <kbd>Tab</kbd> restart &nbsp; <kbd>Backspace</kbd> fix mistakes
  </div>
</div>

<div class="results-overlay" id="resultsOverlay">
  <div class="results-card">
    <h2>Race Complete!</h2>
    <div class="results-grid">
      <div class="result-item">
        <div class="val" id="rWpm">0</div>
        <div class="lbl">WPM</div>
      </div>
      <div class="result-item">
        <div class="val" id="rAcc">0</div>
        <div class="lbl">Accuracy %</div>
      </div>
      <div class="result-item">
        <div class="val" id="rTime">0</div>
        <div class="lbl">Seconds</div>
      </div>
      <div class="result-item">
        <div class="val" id="rErrors">0</div>
        <div class="lbl">Errors</div>
      </div>
    </div>
    <button class="btn btn-primary" id="nextBtn">Next Race</button>
  </div>
</div>

<script>
const SENTENCES = [
  "The quick brown fox jumps over the lazy dog near the riverbank.",
  "She sells seashells by the seashore every single morning.",
  "A journey of a thousand miles begins with a single step forward.",
  "To be or not to be, that is the question we must answer.",
  "All that glitters is not gold, but it sure looks pretty.",
  "The rain in Spain falls mainly on the plain during autumn.",
  "Every moment is a fresh beginning if you let it be one.",
  "Stars can not shine without a little bit of darkness around them.",
  "In the middle of difficulty lies hidden opportunity waiting for you.",
  "Practice does not make perfect, but it does make progress daily.",
  "Knowledge speaks loudly, but wisdom listens carefully to every word spoken.",
  "Life is what happens when you are busy making other plans entirely.",
  "The only way to do great work is to love what you do.",
  "Time flies over us but leaves its shadow far behind on the ground.",
  "Do not count the days, instead make all the days count for something.",
  "Creativity is intelligence having fun with ideas that nobody expected before.",
  "Simplicity is the ultimate sophistication in design and in everyday life.",
  "The best time to plant a tree was twenty years ago or right now.",
  "Not all those who wander are lost, some are just exploring freely.",
  "A smooth sea never made a skilled sailor, so embrace the storms ahead.",
  "Well done is better than well said, so go out and prove yourself.",
  "The pen is mightier than the sword when wielded with truth and care.",
  "Fortune favours the bold, but also those who plan ahead with patience.",
  "An ounce of action is worth a ton of theory in practice.",
  "Music expresses that which cannot be said and on which it is impossible to be silent.",
];

let sentence = "";
let typed = "";
let startTime = null;
let timerInterval = null;
let finished = false;

const sentenceEl = document.getElementById("sentence");
const hiddenInput = document.getElementById("hiddenInput");
const startPrompt = document.getElementById("startPrompt");
const wpmEl = document.getElementById("wpm");
const accEl = document.getElementById("accuracy");
const timerEl = document.getElementById("timer");
const progressEl = document.getElementById("progress");
const overlay = document.getElementById("resultsOverlay");

function pickSentence() {
  let s;
  do { s = SENTENCES[Math.floor(Math.random() * SENTENCES.length)]; } while (s === sentence);
  return s;
}

function renderSentence() {
  let html = "";
  for (let i = 0; i < sentence.length; i++) {
    let cls = "pending";
    if (i < typed.length) {
      cls = typed[i] === sentence[i] ? "correct" : "wrong";
    } else if (i === typed.length) {
      cls = "current";
    }
    const ch = sentence[i] === " " ? "&nbsp;" : escHtml(sentence[i]);
    html += `<span class="char ${cls}">${ch}</span>`;
  }
  sentenceEl.innerHTML = html;
}

function escHtml(c) {
  if (c === "<") return "&lt;";
  if (c === ">") return "&gt;";
  if (c === "&") return "&amp;";
  return c;
}

function updateStats() {
  if (!startTime || typed.length === 0) {
    wpmEl.textContent = "0";
    accEl.textContent = "100";
    return;
  }
  const elapsed = (performance.now() - startTime) / 1000;
  const wpm = (typed.length / 5) / (elapsed / 60);
  const correct = typed.split("").filter((c, i) => sentence[i] === c).length;
  const accuracy = (correct / typed.length) * 100;

  wpmEl.textContent = Math.round(wpm);
  accEl.textContent = accuracy.toFixed(1);
  timerEl.textContent = elapsed.toFixed(1);
  progressEl.style.width = Math.min((typed.length / sentence.length) * 100, 100) + "%";
}

function showResults() {
  finished = true;
  clearInterval(timerInterval);
  const elapsed = (performance.now() - startTime) / 1000;
  const wpm = (typed.length / 5) / (elapsed / 60);
  const correct = typed.split("").filter((c, i) => sentence[i] === c).length;
  const errors = typed.length - correct;
  const accuracy = (correct / typed.length) * 100;

  document.getElementById("rWpm").textContent = Math.round(wpm);
  document.getElementById("rAcc").textContent = accuracy.toFixed(1);
  document.getElementById("rTime").textContent = elapsed.toFixed(1);
  document.getElementById("rErrors").textContent = errors;

  overlay.classList.add("active");
}

function reset() {
  sentence = pickSentence();
  typed = "";
  startTime = null;
  finished = false;
  clearInterval(timerInterval);
  wpmEl.textContent = "0";
  accEl.textContent = "100";
  timerEl.textContent = "0.0";
  progressEl.style.width = "0%";
  overlay.classList.remove("active");
  startPrompt.style.display = "none";
  hiddenInput.value = "";
  renderSentence();
  hiddenInput.focus();
}

// Focus management
document.getElementById("sentenceBox").addEventListener("click", () => {
  hiddenInput.focus();
  if (!startTime && !finished) startPrompt.style.display = "none";
});

hiddenInput.addEventListener("input", (e) => {
  if (finished) return;

  // Use the full input value for current typed state
  const val = hiddenInput.value;

  // Only allow typing up to sentence length
  if (val.length > sentence.length) {
    hiddenInput.value = val.slice(0, sentence.length);
  }
  typed = hiddenInput.value;

  if (!startTime && typed.length > 0) {
    startTime = performance.now();
    startPrompt.style.display = "none";
    timerInterval = setInterval(updateStats, 100);
  }

  renderSentence();
  updateStats();

  if (typed.length >= sentence.length) {
    showResults();
  }
});

// Tab to restart
document.addEventListener("keydown", (e) => {
  if (e.key === "Tab") {
    e.preventDefault();
    reset();
  }
  // Focus the hidden input on any printable key
  if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && document.activeElement !== hiddenInput) {
    hiddenInput.focus();
  }
});

document.getElementById("nextBtn").addEventListener("click", reset);

// Initial setup
sentence = pickSentence();
renderSentence();
hiddenInput.focus();
</script>

</body>
</html>
